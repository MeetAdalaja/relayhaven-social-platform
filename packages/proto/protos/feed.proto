syntax = "proto3";
package relayhaven.feed;

import "common.proto";
import "posts.proto";

service FeedService {
  rpc GetHomeFeed(GetHomeFeedRequest) returns (relayhaven.posts.PostsResponse);
  rpc GetExploreFeed(GetExploreFeedRequest) returns (relayhaven.posts.PostsResponse);
}

message GetHomeFeedRequest {
  string session_token = 1;
  relayhaven.common.PaginationRequest pagination = 2;
}

message GetExploreFeedRequest {
  relayhaven.common.PaginationRequest pagination = 1;
  optional string session_token = 2;
}
